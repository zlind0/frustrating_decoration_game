<style>
:root{
  --bg:#F7F4F0;--surface:#EDEAE4;--border:#D4CEC6;
  --text:#2C2C2C;--muted:#9A958F;--dark:#3A3530;
  --sage:#7D9B76;--tan:#C4A882;--slate:#8FA8B8;
  --gold:#C9A84C;--red:#C06B66;--pink:#C8698A;
  --blue:#6B8FB5;--brown:#9B7A5A;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif;padding:24px 16px}
h1{text-align:center;font-size:1.9rem;font-weight:200;letter-spacing:.5em;color:var(--dark);margin-bottom:4px}
.subtitle{text-align:center;color:var(--muted);font-size:.72rem;letter-spacing:.3em;margin-bottom:36px}

/* Section header */
.section{margin-bottom:40px}
.section-title{font-size:.65rem;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);padding-bottom:8px;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.section-title .ct{display:inline-block;padding:2px 10px;border-radius:20px;font-size:.65rem;color:#fff;letter-spacing:.05em}
.section-title .cnt{font-size:.65rem;color:var(--muted)}

/* Card grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(178px,1fr));gap:12px}

/* ── THE CARD ── */
.card{
  width:100%;aspect-ratio:63/80;
  background:#fff;border-radius:12px;
  border:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow:hidden;
  box-shadow:0 1px 4px rgba(0,0,0,.06);
  transition:transform .15s,box-shadow .15s;
  cursor:default;
}
.card:hover{transform:translateY(-3px);box-shadow:0 6px 18px rgba(0,0,0,.12)}

/* Card header band */
.card-head{padding:10px 10px 8px;display:flex;align-items:flex-start;gap:7px}
.card-icon{font-size:18px;line-height:1;flex-shrink:0;margin-top:1px}
.card-type{font-size:.7rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;opacity:.85}

/* Card body */
.card-body{flex:1;padding:10px;display:flex;flex-direction:column;justify-content:space-between}
.card-title{font-size:1.2rem;font-weight:700;line-height:1.25;color:var(--dark);margin-bottom:5px}
.card-flavor{font-size:.8rem;font-style:italic;color:var(--muted);line-height:1.45;margin-bottom:6px;flex:1}

/* Effect box */
.card-effect{background:rgba(0,0,0,.04);border-radius:6px;padding:5px 7px;margin-bottom:5px}
.eff-label{font-size:.54rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
.eff-text{font-size:.7rem;font-weight:600;color:var(--dark);line-height:1.3}

/* Fine print */
.card-fine{font-size:.8rem;color:var(--muted);line-height:1.4;border-top:1px solid var(--border);padding:5px 10px 7px;background:rgba(0,0,0,.02)}

/* ── Color themes per card type ── */
/* Subsidy 补贴 - sage green */
.t-subsidy .card-head{background:var(--sage);color:#fff}
.t-subsidy .card-type{color:rgba(255,255,255,.85)}
/* Extra 增项 - warm tan */
.t-extra .card-head{background:var(--tan);color:#fff}
/* Prepay 预存款 - slate */
.t-prepay .card-head{background:var(--slate);color:#fff}
/* Runaway 跑路 - dark */
.t-runaway .card-head{background:var(--dark);color:#fff}
/* Corners 偷工减料 - brown */
.t-corners .card-head{background:var(--brown);color:#fff}
/* Property 物业 - gold */
.t-property .card-head{background:var(--gold);color:#fff}
/* TimeLimit 今日优惠 - red-orange */
.t-timelimit .card-head{background:var(--red);color:#fff}
/* UltraLow 超低价 - slate blue */
.t-ultralow .card-head{background:var(--slate);color:#fff}
/* Promo 普通促销 - muted */
.t-promo .card-head{background:#8A8580;color:#fff}
/* Inspect 视察 - blue */
.t-inspect .card-head{background:var(--blue);color:#fff}
/* Xiaohongshu - pink */
.t-xhs .card-head{background:var(--pink);color:#fff}
</style>
</head>
